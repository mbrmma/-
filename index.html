<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заказ клубники</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Заказ клубники</h1>
      <p class="sub">Выбери фасовку, укажи имя и номер, затем отправь заказ.</p>
    </div>

    <div class="card">
      <div class="title">0,5 кг</div>
      <div class="price">500 ₽</div>
      <div class="qty">
        <button class="minus" onclick="changeQty('half', -1)">−</button>
        <div class="count" id="halfCount">0</div>
        <button class="plus" onclick="changeQty('half', 1)">+</button>
      </div>
    </div>

    <div class="card">
      <div class="title">1 кг</div>
      <div class="price">1000 ₽</div>
      <div class="qty">
        <button class="minus" onclick="changeQty('one', -1)">−</button>
        <div class="count" id="oneCount">0</div>
        <button class="plus" onclick="changeQty('one', 1)">+</button>
      </div>
    </div>

    <div class="card">
      <div class="title">1,5 кг</div>
      <div class="price">1500 ₽</div>
      <div class="qty">
        <button class="minus" onclick="changeQty('onehalf', -1)">−</button>
        <div class="count" id="onehalfCount">0</div>
        <button class="plus" onclick="changeQty('onehalf', 1)">+</button>
      </div>
    </div>

    <div class="card">
      <div class="title">2 кг</div>
      <div class="price">2000 ₽</div>
      <div class="qty">
        <button class="minus" onclick="changeQty('two', -1)">−</button>
        <div class="count" id="twoCount">0</div>
        <button class="plus" onclick="changeQty('two', 1)">+</button>
      </div>

      <div class="total" id="total">Итого: 0 ₽</div>

      <input id="name" type="text" placeholder="Ваше имя" />
      <input id="phone" type="text" placeholder="Телефон" />
      <textarea id="comment" placeholder="Комментарий к заказу"></textarea>

      <button class="buy" onclick="sendOrder()">Отправить заказ</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const prices = {
      half: 500,
      one: 1000,
      onehalf: 1500,
      two: 2000
    };

    const counts = {
      half: 0,
      one: 0,
      onehalf: 0,
      two: 0
    };

    function changeQty(key, delta) {
      counts[key] = Math.max(0, counts[key] + delta);
      document.getElementById(key + "Count").textContent = counts[key];
      updateTotal();
    }

    function updateTotal() {
      const total =
        counts.half * prices.half +
        counts.one * prices.one +
        counts.onehalf * prices.onehalf +
        counts.two * prices.two;

      document.getElementById("total").textContent = "Итого: " + total + " ₽";
      return total;
    }

    function sendOrder() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const comment = document.getElementById("comment").value.trim();
      const total = updateTotal();

      if (!name || !phone) {
        tg.showAlert("Введите имя и телефон");
        return;
      }

      const order = {
        name,
        phone,
        comment,
        items: {
          "0.5 кг": counts.half,
          "1 кг": counts.one,
          "1.5 кг": counts.onehalf,
          "2 кг": counts.two
        },
        total
      };

      tg.sendData(JSON.stringify(order));
    }
  </script>
</body>
</html>
